name: Build ISO

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-iso:
    name: Build x86-64 ISO
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: debian:trixie    # Matches the canonical dev build box.
                              # Trixie ships gcc 14.2, which matches the
                              # toolchain vigil & the kernel were built
                              # against originally.  Using a different
                              # gcc version produced a vigil that crashed
                              # on startup (different function alignment /
                              # optimization caused a NULL deref in musl).

    permissions:
      contents: write    # required for creating releases on tag push

    defaults:
      run:
        working-directory: aegis

    steps:
      - name: Install git + ca-certificates (for checkout actions)
        working-directory: /
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl sudo

      - name: Checkout aegis
        uses: actions/checkout@v4
        with:
          path: aegis

      - name: Checkout vortex (sibling test harness dependency)
        uses: actions/checkout@v4
        with:
          repository: exec/vortex
          path: vortex

      - name: Install build dependencies
        working-directory: /
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            gcc-x86-64-linux-gnu \
            nasm \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-common \
            xorriso \
            mtools \
            dosfstools \
            musl-tools \
            gdisk \
            e2fsprogs \
            libssl-dev \
            pkg-config \
            file \
            python3 \
            python3-pil \
            qemu-system-x86 \
            rustup

      - name: Create x86_64-elf cross-toolchain symlinks
        working-directory: /
        run: |
          # The Makefile expects x86_64-elf-<tool>; Debian ships
          # x86_64-linux-gnu-<tool>. Symlink them — the toolchains are
          # equivalent for our freestanding kernel build (-ffreestanding
          # -nostdlib), as documented in CLAUDE.md.
          for tool in gcc ld ar as nm objcopy objdump strip; do
            ln -sf /usr/bin/x86_64-linux-gnu-$tool \
                   /usr/local/bin/x86_64-elf-$tool
          done
          x86_64-elf-gcc --version

      - name: Install Rust stable + nightly via rustup
        run: |
          # rustup is a shim in Debian; first run fetches the real toolchain
          rustup default stable
          rustup target add x86_64-unknown-linux-musl
          rustup toolchain install nightly --component rust-src
          rustup +nightly target add x86_64-unknown-none
          rustup show
          # Add cargo to PATH for subsequent steps
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache vendored source tarballs
        uses: actions/cache@v4
        with:
          path: |
            aegis/references/musl-1.2.5.tar.gz
            aegis/references/bearssl-0.6.tar.gz
          key: vendored-tarballs-musl-1.2.5-bearssl-0.6

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('aegis/**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Cache kernel/cap Rust build
        uses: actions/cache@v4
        with:
          path: aegis/kernel/cap/target
          key: cap-target-${{ hashFiles('aegis/kernel/cap/**/*.rs', 'aegis/kernel/cap/Cargo.toml') }}

      - name: Cache rune build
        uses: actions/cache@v4
        with:
          path: aegis/references/rune/target
          key: rune-target-${{ hashFiles('aegis/tools/build-rune.sh') }}

      - name: Verify toolchain
        run: |
          x86_64-elf-gcc --version | head -1
          nasm --version
          grub-mkrescue --version
          xorriso -version 2>&1 | head -1
          rustup show active-toolchain

      - name: Build ISO
        run: |
          make iso
          ls -lh build/aegis.iso
          file build/aegis.iso

      - name: Run boot oracle + poll test
        run: |
          AEGIS_ISO=$PWD/build/aegis.iso \
            cargo test --manifest-path tests/Cargo.toml \
            --test boot_oracle --test poll_test -- --nocapture

      - name: Rename ISO for release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cp build/aegis.iso "build/aegis-${VERSION}-x86_64.iso"
          sha256sum "build/aegis-${VERSION}-x86_64.iso" \
            > "build/aegis-${VERSION}-x86_64.iso.sha256"
          cat "build/aegis-${VERSION}-x86_64.iso.sha256"

      - name: Upload ISO artifact (CI runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: aegis-iso
          path: aegis/build/aegis.iso
          retention-days: 14
          compression-level: 0    # ISO is already compressed

      - name: Upload release artifacts (tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: aegis-release-${{ github.ref_name }}
          path: |
            aegis/build/aegis-*-x86_64.iso
            aegis/build/aegis-*-x86_64.iso.sha256
          retention-days: 90
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            aegis/build/aegis-*-x86_64.iso
            aegis/build/aegis-*-x86_64.iso.sha256
          body: |
            ## Aegis ${{ github.ref_name }}

            **v1 software — first public release, not production-hardened.**
            The C kernel likely contains real, exploitable vulnerabilities.
            Do not deploy on untrusted networks or with real secrets.

            ### Boot in QEMU

            ```
            qemu-system-x86_64 -cdrom aegis-${{ github.ref_name }}-x86_64.iso \
              -m 2G -vga std -serial stdio
            ```

            ### Flash to USB (Linux)

            ```
            sudo dd if=aegis-${{ github.ref_name }}-x86_64.iso of=/dev/sdX \
              bs=4M status=progress conv=fsync
            ```

            See [aegis.byexec.com](https://aegis.byexec.com) for documentation.

            Verify the download:
            ```
            sha256sum -c aegis-${{ github.ref_name }}-x86_64.iso.sha256
            ```

  build-arm64:
    name: Build ARM64 kernel + boot oracle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: debian:trixie    # Same base as build-iso: Trixie ships
                              # gcc 14.2 for both x86 and aarch64.
    defaults:
      run:
        working-directory: aegis

    steps:
      - name: Install git + ca-certificates (for checkout actions)
        working-directory: /
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl sudo

      - name: Checkout aegis
        uses: actions/checkout@v4
        with:
          path: aegis

      - name: Checkout vortex (sibling test harness dependency)
        uses: actions/checkout@v4
        with:
          repository: exec/vortex
          path: vortex

      - name: Install ARM64 build dependencies
        working-directory: /
        run: |
          apt-get install -y --no-install-recommends \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            libssl-dev \
            pkg-config \
            file \
            qemu-system-arm \
            rustup

      - name: Create aarch64-elf cross-toolchain symlinks
        working-directory: /
        run: |
          # kernel/arch/arm64/Makefile expects aarch64-elf-<tool>;
          # Debian ships aarch64-linux-gnu-<tool>. Symlink them — the
          # toolchains are equivalent for our freestanding kernel
          # build (-ffreestanding -nostdlib), same pattern as x86.
          for tool in gcc ld ar as nm objcopy objdump strip; do
            ln -sf /usr/bin/aarch64-linux-gnu-$tool \
                   /usr/local/bin/aarch64-elf-$tool
          done
          aarch64-elf-gcc --version

      - name: Install Rust stable via rustup
        run: |
          rustup default stable
          rustup show
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-arm64-${{ hashFiles('aegis/**/Cargo.lock') }}
          restore-keys: cargo-arm64-

      - name: Verify toolchain
        run: |
          aarch64-elf-gcc --version | head -1
          qemu-system-aarch64 --version | head -1
          rustup show active-toolchain

      - name: Build ARM64 kernel
        run: |
          make -C kernel/arch/arm64
          ls -lh kernel/arch/arm64/build/aegis-arm64.elf
          file kernel/arch/arm64/build/aegis-arm64.elf

      - name: Run ARM64 boot oracle
        run: |
          VORTEX_QEMU_BINARY=qemu-system-aarch64 \
          AEGIS_ARM64_ELF=$PWD/kernel/arch/arm64/build/aegis-arm64.elf \
          AEGIS_BOOT_TIMEOUT=30 \
            cargo test --manifest-path tests/Cargo.toml \
            --test boot_oracle_arm64 -- --nocapture

      - name: Upload ARM64 ELF artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: aegis-arm64-elf
          path: aegis/kernel/arch/arm64/build/aegis-arm64.elf
          retention-days: 14
