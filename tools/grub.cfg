set timeout=0
set default=0

# Redirect GRUB terminal to VGA console only.
# In headless QEMU testing with no VGA device, this suppresses GRUB output
# on COM1 — only the kernel's own serial output appears.
terminal_input console
terminal_output console

menuentry "Aegis" {
    multiboot2 /boot/aegis.elf
    boot
}
