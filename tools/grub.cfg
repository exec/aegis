set timeout=3
set default=0

insmod all_video
insmod gfxterm
insmod png

set gfxmode=auto
terminal_input console
terminal_output gfxterm

if background_image /boot/grub/wallpaper.png; then
    true
fi

menuentry "Aegis (graphical)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=graphical quiet
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}

menuentry "Aegis (text)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text quiet
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}

menuentry "Aegis (debug)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}
