set timeout=0
set default=0

# Load all video drivers (VBE for BIOS mode, GOP for UEFI mode).
insmod all_video
insmod gfxterm

# Request 1024x768x32 linear framebuffer; fall back to auto if unavailable.
set gfxmode=1024x768x32,auto

# Use the graphical terminal for GRUB's own output.
# Falls back to console text mode if gfxterm cannot initialise.
terminal_input console
terminal_output gfxterm

menuentry "Aegis" {
    # Pass the current video mode (framebuffer) to the OS via multiboot2 tag 8.
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}
