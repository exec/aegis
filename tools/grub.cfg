set timeout=0
set default=0

# Load all video drivers (VBE for BIOS mode, GOP for UEFI mode).
insmod all_video
insmod gfxterm

# Use native resolution framebuffer; fall back to any available mode.
set gfxmode=auto

# Use the graphical terminal for GRUB's own output.
# Falls back to console text mode if gfxterm cannot initialise.
terminal_input console
terminal_output gfxterm

menuentry "Aegis" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}
