set timeout=3
set default=0

insmod part_gpt
insmod ext2
insmod all_video
insmod gfxterm
insmod png
insmod font

# Find the Aegis root partition (type GUID A3618F24-0C76-4B3D-0001-...)
# search.fs_uuid isn't available for type-GUID matching, so we try each
# likely (hdN,gptM) pair and use the first one that has /boot/aegis.elf.
for part in (hd0,gpt1) (hd0,gpt2) (hd0,gpt3) (hd1,gpt1) (hd1,gpt2); do
    if [ -z "$root_found" ]; then
        set root=$part
        if [ -e /boot/aegis.elf ]; then
            set root_found=1
        fi
    fi
done

set gfxmode=1280x800x32,1024x768x32,800x600x32
if loadfont /boot/grub/font.pf2; then
    true
else
    loadfont unicode
fi
terminal_input console
terminal_output gfxterm

if background_image /boot/grub/wallpaper.png; then
    true
fi

menuentry "Aegis (graphical)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=graphical quiet
    boot
}

menuentry "Aegis (text)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text quiet
    boot
}

menuentry "Aegis (debug)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text
    boot
}
