set timeout=3
set default=0

insmod part_gpt
insmod ext2
insmod search
insmod search_fs_file
insmod all_video
insmod gfxterm
insmod png
insmod font

# Locate the Aegis root partition by scanning all disks+partitions for
# /boot/aegis.elf. search --file works regardless of how many disks are
# attached and without needing GRUB's [ ] test command (which isn't
# available in all builds).
search --no-floppy --file --set=root /boot/aegis.elf

set gfxmode=1280x800x32,1024x768x32,800x600x32
if loadfont /boot/grub/font.pf2; then
    true
else
    loadfont unicode
fi
terminal_input console
terminal_output gfxterm

if background_image /boot/grub/wallpaper.png; then
    true
fi

menuentry "Aegis (graphical)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=graphical quiet
    boot
}

menuentry "Aegis (text)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text quiet
    boot
}

menuentry "Aegis (debug)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text
    boot
}
